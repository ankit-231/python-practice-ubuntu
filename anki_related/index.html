<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>German Words</title>

  <style>
    body {
      font-family: Arial;
    }

    table {
      border-collapse: collapse;
      width: 600px;
    }

    td,
    th {
      border: 1px solid black;
      padding: 8px;
    }

    tr:hover {
      background: #eee;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>German Words</h2>

  <table id="wordTable">
    <tr>
      <th>Audio</th>
      <th>German</th>
      <th>English</th>
    </tr>
  </table>

  <script>

    async function loadWords() {

      const res = await fetch("german_words.json");
      const words = await res.json();

      const table = document.getElementById("wordTable");

      words.forEach(w => {

        const tr = document.createElement("tr");

        const tdAudio = document.createElement("td");
        const tdGerman = document.createElement("td");
        const tdEnglish = document.createElement("td");

        const btn = document.createElement("button");

        btn.innerText = "▶";

        btn.onclick = () => {
          const audio = new Audio(w.audio_url);
          audio.play();
        };

        tdAudio.appendChild(btn);
        tdGerman.innerText = w.german;
        tdEnglish.innerText = w.english;

        tr.appendChild(tdAudio);
        tr.appendChild(tdGerman);
        tr.appendChild(tdEnglish);

        table.appendChild(tr);

      });
    }

    loadWords();

  </script>

</body>

</html>
